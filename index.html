<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>100天減脂計畫</title>

<style>
*{box-sizing:border-box}
body{margin:0;background:#fafaf9;color:#1c1917;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:15px}
.app{max-width:720px;margin:0 auto;padding:14px}
.card{background:white;border-radius:22px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.05)}

h1{font-size:24px;margin:0 0 6px}
h2{font-size:18px;margin:0 0 6px}

p{color:#57534e;margin:0;line-height:1.4}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.stat{background:white;border-radius:18px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.stat small{color:#78716c}
.stat b{display:block;font-size:20px;margin-top:4px;white-space:nowrap}

input,select,textarea{
width:100%;
border:0;
border-radius:14px;
background:white;
padding:12px;
font-size:14px;
outline:none
}

.field{background:#f5f5f4;border-radius:16px;padding:10px;margin-bottom:8px}
.field label{display:block;font-weight:700;color:#57534e;font-size:13px;margin-bottom:6px}

button{
border:0;
border-radius:16px;
padding:12px;
font-weight:700;
font-size:14px
}

.primary{background:#1c1917;color:white}
.secondary{background:white;border:1px solid #ddd}

.row{display:flex;gap:8px}
.row>*{flex:1}

.hidden{display:none!important}
</style>
</head>

<body>
<div class="app">

<header class="card">
<h1>100天減脂計畫</h1>
<p>每日記錄體重、蛋白質、水量與運動；每週追蹤圍度與體態變化。</p>
</header>

<section class="grid2">
<div class="stat"><small>已持續天數</small><b id="streak">0 天</b></div>
<div class="stat"><small>目前體重</small><b id="latestWeight">—kg</b></div>
<div class="stat"><small>平均水量</small><b id="avgWater">—ml</b></div>
<div class="stat"><small>體態照</small><b id="photoCount">0 張</b></div>
</section>

<section class="card">
<label><b>開始日期</b></label>
<input id="startDate" type="date" />

<div class="row" style="margin-top:10px">
<button class="primary" onclick="jumpToday()">跳到今天</button>
<button class="secondary" id="modeBtn" onclick="toggleMode()">完整模式</button>
</div>
</section>

<section class="card">
<h2>每日紀錄</h2>

<select id="daySelect"></select>

<div class="field">
<label>今日狀態</label>
<select id="lifeStatus">
<option value="">選擇狀態</option>
<option>正常 Routine</option>
<option>旅遊中</option>
<option>月經期間</option>
<option>聚餐日</option>
<option>身體不適</option>
<option>休息日</option>
</select>
</div>

<div class="field"><label>體重 kg</label><input id="weight"></div>
<div class="field"><label>蛋白質 g</label><input id="protein"></div>
<div class="field"><label>喝水 ml</label><input id="water"></div>

<div class="field">
<label>運動</label>
<select id="workout">
<option value="">選擇</option>
<option>上肢</option>
<option>臀腿</option>
<option>有氧</option>
<option>休息</option>
</select>
</div>

<div id="fullMode">
<div class="field"><label>熱量 kcal</label><input id="calories"></div>
<div class="field"><label>碳水 g</label><input id="carbs"></div>
<div class="field"><label>脂肪 g</label><input id="fat"></div>
<div class="field"><label>狀態 1-5</label><input id="score"></div>
</div>

</section>

<section class="card">
<h2>每週圍度紀錄</h2>

<select id="weekSelect"></select>

<div class="field"><label>腰圍</label><input id="waist"></div>
<div class="field"><label>臀圍</label><input id="hip"></div>
<div class="field"><label>大腿</label><input id="thigh"></div>
<div class="field"><label>手臂</label><input id="arm"></div>

</section>

<div class="row">
<button class="primary" onclick="save()">儲存</button>
<button class="secondary" onclick="resetAll()">清空</button>
</div>

</div>

<script>
const TOTAL=100
let simpleMode=true

let data=JSON.parse(localStorage.getItem("fatloss")) ||
Array.from({length:TOTAL},(_,i)=>({
day:i+1,lifeStatus:"",weight:"",protein:"",water:"",workout:"",calories:"",carbs:"",fat:"",score:""
}))

let currentDay=1

function save(){
localStorage.setItem("fatloss",JSON.stringify(data))
updateStreak()
}

function resetAll(){
if(!confirm("確定清空？"))return
localStorage.removeItem("fatloss")
location.reload()
}

function update(field,value){
data[currentDay-1][field]=value
save()
}

function updateStreak(){
let count=0
for(let d of data){
if(d.weight||d.protein||d.water||d.workout) count++
else break
}
document.getElementById("streak").innerText=count+" 天"
}

function toggleMode(){
simpleMode=!simpleMode
document.getElementById("fullMode").classList.toggle("hidden",simpleMode)
document.getElementById("modeBtn").innerText=simpleMode?"完整模式":"簡單模式"
}

function jumpToday(){
currentDay=1
load()
}

function load(){
let d=data[currentDay-1]
weight.value=d.weight
protein.value=d.protein
water.value=d.water
workout.value=d.workout
lifeStatus.value=d.lifeStatus
calories.value=d.calories
carbs.value=d.carbs
fat.value=d.fat
score.value=d.score
}

for(let i=1;i<=TOTAL;i++){
let opt=document.createElement("option")
opt.value=i
opt.text="Day "+i
daySelect.appendChild(opt)
}

daySelect.onchange=(e)=>{
currentDay=Number(e.target.value)
load()
}

["weight","protein","water","workout","lifeStatus","calories","carbs","fat","score"].forEach(id=>{
document.getElementById(id).oninput=(e)=>update(id,e.target.value)
})

updateStreak()
load()
</script>
</body>
</html>
